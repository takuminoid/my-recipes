<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案A: 温かみ配色 + カード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #fdf8f3;
    color: #2c1a0e;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* ヘッダー */
  header {
    background: #c2440e;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 8px rgba(194,68,14,0.25);
  }
  header h1 {
    color: #fff;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  header span { font-size: 1.4rem; }
  .btn-new {
    background: #fff;
    color: #c2440e;
    border: none;
    border-radius: 20px;
    padding: 7px 18px;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.03em;
  }

  /* 検索 */
  .search-wrap {
    max-width: 760px;
    margin: 28px auto 0;
    padding: 0 20px;
  }
  .search-wrap input {
    width: 100%;
    background: #fff;
    border: 2px solid #e8d5c4;
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 0.88rem;
    outline: none;
    color: #2c1a0e;
  }
  .search-wrap input:focus { border-color: #c2440e; }

  /* グリッド */
  .grid {
    max-width: 760px;
    margin: 24px auto 40px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 16px;
  }

  /* カード */
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 18px 16px 14px;
    box-shadow: 0 2px 10px rgba(44,26,14,0.08);
    border: 1px solid #f0e0d0;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(44,26,14,0.14);
  }
  .card-icon {
    font-size: 2.2rem;
    margin-bottom: 10px;
    display: block;
  }
  .card-name {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.4;
    color: #2c1a0e;
  }
  .card-date {
    font-size: 0.75rem;
    color: #a0836e;
    margin-bottom: 8px;
  }
  .card-stars {
    color: #e8830a;
    font-size: 1rem;
    letter-spacing: 1px;
  }
  .card-stars .empty { color: #e8d5c4; }

  /* 詳細ページ */
  .detail-wrap {
    max-width: 640px;
    margin: 32px auto 40px;
    padding: 0 20px;
  }
  .back-link {
    font-size: 0.82rem;
    color: #a0836e;
    text-decoration: none;
    display: inline-block;
    margin-bottom: 16px;
  }
  .detail-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 24px;
  }
  .detail-title { font-size: 1.6rem; font-weight: 800; color: #2c1a0e; line-height: 1.3; }
  .detail-meta { font-size: 0.82rem; color: #a0836e; margin-top: 4px; }
  .detail-stars { color: #e8830a; font-size: 1.3rem; margin-top: 4px; }
  .btn-edit {
    background: #fdf8f3;
    border: 1.5px solid #e8d5c4;
    color: #2c1a0e;
    border-radius: 8px;
    padding: 7px 16px;
    font-size: 0.82rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .section { margin-bottom: 24px; }
  .section-title {
    font-size: 0.72rem;
    font-weight: 700;
    color: #c2440e;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1.5px solid #f0e0d0;
  }
  .ingredient-list { border: 1.5px solid #f0e0d0; border-radius: 10px; overflow: hidden; }
  .ingredient-row {
    display: flex;
    justify-content: space-between;
    padding: 9px 14px;
    font-size: 0.88rem;
    border-bottom: 1px solid #f5ebe0;
  }
  .ingredient-row:last-child { border-bottom: none; }
  .amount { color: #a0836e; }
  .steps-text { font-size: 0.9rem; line-height: 1.9; color: #3d2a1a; }
  .steps-text ol { padding-left: 1.2rem; }
  .steps-text li { margin-bottom: 6px; }

  /* 区切り */
  .divider {
    border: none;
    border-top: 2px dashed #f0e0d0;
    margin: 40px 0;
  }
  .label {
    display: inline-block;
    background: #fff3e8;
    color: #c2440e;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    margin-bottom: 20px;
    border: 1px solid #f5d0b0;
  }
</style>
</head>
<body>

<header>
  <h1>🍳 My Recipes</h1>
  <button class="btn-new">＋ 新しいレシピ</button>
</header>

<div class="search-wrap">
  <input type="text" placeholder="🔍　料理名で検索...">
</div>

<div class="grid">
  <div class="card">
    <span class="card-icon">🍗</span>
    <div class="card-name">鶏の唐揚げ</div>
    <div class="card-date">2026-05-03</div>
    <div class="card-stars">★★★★★</div>
  </div>
  <div class="card">
    <span class="card-icon">🍝</span>
    <div class="card-name">ナポリタン</div>
    <div class="card-date">2026-04-28</div>
    <div class="card-stars">★★★★<span class="empty">★</span></div>
  </div>
  <div class="card">
    <span class="card-icon">🥗</span>
    <div class="card-name">シーザーサラダ</div>
    <div class="card-date">2026-04-20</div>
    <div class="card-stars">★★★<span class="empty">★★</span></div>
  </div>
  <div class="card">
    <span class="card-icon">🍜</span>
    <div class="card-name">味噌ラーメン</div>
    <div class="card-date">2026-04-15</div>
    <div class="card-stars">★★★★★</div>
  </div>
</div>

<hr class="divider">

<!-- 詳細ページのプレビュー -->
<div class="detail-wrap">
  <div class="label">詳細ページ</div>
  <a href="#" class="back-link">← 一覧に戻る</a>
  <div class="detail-header">
    <div>
      <div class="detail-title">🍗 鶏の唐揚げ</div>
      <div class="detail-meta">2026-05-03</div>
      <div class="detail-stars">★★★★★</div>
    </div>
    <button class="btn-edit">編集</button>
  </div>

  <div class="section">
    <div class="section-title">材料</div>
    <div class="ingredient-list">
      <div class="ingredient-row"><span>鶏もも肉</span><span class="amount">300g</span></div>
      <div class="ingredient-row"><span>醤油</span><span class="amount">大さじ2</span></div>
      <div class="ingredient-row"><span>みりん</span><span class="amount">大さじ1</span></div>
      <div class="ingredient-row"><span>片栗粉</span><span class="amount">適量</span></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">作り方</div>
    <div class="steps-text">
      <ol>
        <li>鶏肉を一口大に切る</li>
        <li>醤油・みりんで30分下味をつける</li>
        <li>片栗粉をまぶし、180℃の油で3分揚げる</li>
      </ol>
    </div>
  </div>
</div>

</body>
</html>
